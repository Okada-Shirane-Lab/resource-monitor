<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Resource Monitor</title>
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <div class="container">
            <h1>Shirane Lab Monitor</h1>
            <div class="network-section">
                <details class="network-details">
                    <summary class="network-summary">
                        きょうの研究室メンバー
                    </summary>
                    <div id="network-content" class="network-loading">
                        ネットワーク情報を読み込み中...
                    </div>
                </details>
            </div>
            <div class="filter-bar">
                <input
                    id="filter-input"
                    class="filter-input"
                    type="text"
                    placeholder="計算機名 / ユーザー名でフィルタ"
                />
            </div>
            <div id="content" class="loading">データを読み込み中...</div>
            <div class="refresh-info">自動更新: 10秒ごと</div>
        </div>

        <script>
            let latestMachines = [];

            async function loadMetrics() {
                try {
                    const response = await fetch("/api/metrics/latest");
                    const data = await response.json();

                    if (data.success && data.data && data.data.machines) {
                        latestMachines = data.data.machines;
                        renderMetrics(latestMachines);
                    } else {
                        showError("メトリクスデータが利用できません");
                    }
                } catch (error) {
                    showError(
                        "メトリクスの読み込みに失敗しました: " + error.message,
                    );
                }
            }

            async function loadNetworkUsers() {
                try {
                    const response = await fetch("/api/network/users");
                    const data = await response.json();

                    if (data.success && Array.isArray(data.data)) {
                        renderNetworkUsers(data.data);
                    } else {
                        showNetworkError("ネットワーク情報を取得できません");
                    }
                } catch (error) {
                    showNetworkError(
                        "ネットワーク情報の取得に失敗しました: " +
                            error.message,
                    );
                }
            }

            function renderMetrics(machines) {
                const filterInput = document.getElementById("filter-input");
                const filterText = (filterInput?.value || "")
                    .trim()
                    .toLowerCase();

                if (machines.length === 0) {
                    document.getElementById("content").innerHTML =
                        '<div class="error-message">接続されたマシンがありません</div>';
                    return;
                }

                const filteredMachines = machines
                    .filter((machine) => {
                        if (!filterText) return true;

                        const machineName = (
                            machine.hostname || ""
                        ).toLowerCase();
                        const hasMachineMatch =
                            machineName.includes(filterText);

                        const hasUserMatch = (machine.top_users || []).some(
                            (user) =>
                                (user.username || "")
                                    .toLowerCase()
                                    .includes(filterText),
                        );

                        return hasMachineMatch || hasUserMatch;
                    })
                    .sort((a, b) =>
                        (a.hostname || "").localeCompare(
                            b.hostname || "",
                            "ja",
                            { sensitivity: "base" },
                        ),
                    );

                if (filteredMachines.length === 0) {
                    document.getElementById("content").innerHTML =
                        '<div class="error-message">条件に一致する計算機がありません</div>';
                    return;
                }

                let html = '<div class="machines-grid">';

                filteredMachines.forEach((machine) => {
                    const isOnline = isRecentlyUpdated(machine.timestamp);
                    const statusClass = isOnline ? "online" : "offline";
                    const statusText = isOnline ? "Online" : "Offline";

                    html += `
                    <div class="machine-card">
                        <div class="machine-header">
                            <div class="machine-title-row">
                                <div class="machine-name">${escapeHtml(machine.hostname)}</div>
                                <span class="status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="machine-id">ID: ${escapeHtml(machine.machine_id)}</div>
                        </div>

                        <div class="metric">
                            <div class="metric-label">
                                <span>CPU</span>
                                <span>${machine.cpu_usage.toFixed(1)}%</span>
                            </div>
                            <div class="metric-bar">
                                <div class="metric-fill cpu" style="width: ${Math.min(machine.cpu_usage, 100)}%"></div>
                            </div>
                        </div>

                        <div class="metric">
                            <div class="metric-label">
                                <span>メモリ</span>
                                <span>${machine.memory_usage.toFixed(1)}%</span>
                            </div>
                            <div class="metric-bar">
                                <div class="metric-fill memory" style="width: ${Math.min(machine.memory_usage, 100)}%"></div>
                            </div>
                            <div class="memory-details">
                                ${formatBytes(machine.memory_used)} / ${formatBytes(machine.memory_total)}
                            </div>
                        </div>

                        <div class="top-users-section">
                            ${
                                machine.top_users &&
                                machine.top_users.length > 0
                                    ? `
                                <div class="top-users-list">
                                    ${machine.top_users
                                        .map(
                                            (user, idx) => `
                                        <div class="user-card">
                                            <div class="user-row">
                                                <div class="user-rank-name" data-rank="${idx + 1}">${escapeHtml(user.username)}</div>
                                                <div class="user-stats">
                                                    <div class="user-stat-line">
                                                        <span class="user-stat-label">CPU:</span>
                                                        <span class="user-cpu">${user.cpu_percentage.toFixed(1)}%</span>
                                                    </div>
                                                    <div class="user-stat-line">
                                                        <span class="user-stat-label">メモリ:</span>
                                                        <span class="user-memory">${user.memory_percentage.toFixed(1)}%</span>
                                                        <span class="user-memory-bytes">(${formatBytes(user.memory_bytes)})</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    `,
                                        )
                                        .join("")}
                                </div>
                            `
                                    : '<div class="no-user-info">ユーザー情報なし</div>'
                            }
                        </div>

                        <div class="timestamp">
                            更新: ${new Date(machine.timestamp).toLocaleString("ja-JP")}
                        </div>
                    </div>
                `;
                });

                html += "</div>";
                document.getElementById("content").innerHTML = html;
            }

            function showError(message) {
                document.getElementById("content").innerHTML =
                    `<div class="error-message">${escapeHtml(message)}</div>`;
            }

            function renderNetworkUsers(users) {
                const container = document.getElementById("network-content");
                if (!users || users.length === 0) {
                    container.innerHTML =
                        '<div class="network-empty">対応するユーザーは見つかりませんでした</div>';
                    return;
                }

                const rows = users
                    .map((user) => {
                        const statusClass =
                            user.status === "online"
                                ? "network-status-online"
                                : "network-status-offline";
                        const statusText =
                            user.status === "online" ? "在席中" : "不在中";

                        return `<li>
                            <span class="network-user-name">${escapeHtml(user.username)}</span>
                            <span class="${statusClass}">${statusText}</span>
                        </li>`;
                    })
                    .join("");

                container.innerHTML = `<ul class="network-user-list">${rows}</ul>`;
            }

            function showNetworkError(message) {
                document.getElementById("network-content").innerHTML =
                    `<div class="error-message">${escapeHtml(message)}</div>`;
            }

            function isRecentlyUpdated(timestamp) {
                const updated = new Date(timestamp);
                const now = new Date();
                const diffSeconds = (now - updated) / 1000;
                return diffSeconds < 60; // 60秒以内
            }

            function formatBytes(bytes) {
                if (bytes === 0) return "0 B";
                const k = 1024;
                const sizes = ["B", "KB", "MB", "GB", "TB", "PB"];
                const i = Math.min(
                    Math.floor(Math.log(bytes) / Math.log(k)),
                    sizes.length - 1,
                );
                return (
                    parseFloat((bytes / Math.pow(k, i)).toFixed(2)) +
                    " " +
                    sizes[i]
                );
            }

            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            document
                .getElementById("filter-input")
                .addEventListener("input", () => renderMetrics(latestMachines));

            const networkSection = document.querySelector(".network-section");
            const networkDetails =
                networkSection?.querySelector(".network-details");
            if (
                networkSection &&
                networkDetails instanceof HTMLDetailsElement
            ) {
                networkSection.addEventListener("click", (event) => {
                    const target = event.target;
                    if (
                        target instanceof HTMLElement &&
                        target.closest(".network-summary")
                    ) {
                        return;
                    }
                    networkDetails.open = !networkDetails.open;
                });
            }

            loadMetrics();
            loadNetworkUsers();
            setInterval(loadMetrics, 10_000);
            setInterval(loadNetworkUsers, 10_000);
        </script>
    </body>
</html>
